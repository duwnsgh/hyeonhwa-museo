<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨夜 — 동양화로 그린 벗</title>
<meta name="description" content="어둠 속의 전시 — 동양화로 그린 벗들의 밤. 묵향이 흐르는 가로 두루마리 갤러리.">
<meta name="theme-color" content="#050505">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@200;300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  /* ═════════ 색 · 토큰 ═════════ */
  :root {
    --void:        #050505;   /* 칠흑 바탕 */
    --void-2:      #0a0a0b;
    --surface:     #121212;   /* 카드/표면 */
    --surface-2:   #1a1a1b;
    --line:        rgba(250,250,250,0.10);
    --line-strong: rgba(250,250,250,0.18);

    --scarlet:     #ff3b2f;   /* 주홍 글로우 */
    --scarlet-2:   #ff6a5a;
    --scarlet-deep:#c42b22;

    --ash:         #fafafa;   /* 본문 글자 */
    --ash-soft:    #cfc9c0;   /* 살짝 따뜻한 회백 */
    --ash-mute:    #948d83;   /* 보조 글자 */

    --glow:        0 0 24px rgba(255,59,47,0.55);
    --glow-soft:   0 0 14px rgba(255,59,47,0.35);

    --ease:        cubic-bezier(0.16, 1, 0.3, 1);

    /* z-index 스케일 */
    --z-bg: 0; --z-content: 3; --z-chrome: 50; --z-top: 100;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--void);
    color: var(--ash);
    font-family: 'Noto Serif KR', serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: var(--scarlet); color: var(--void); }

  /* 분위기 ─ 주홍 앰비언트 글로우 + 비네트 */
  .ambient {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: var(--z-bg);
    background:
      radial-gradient(60% 50% at 14% -4%,  rgba(255,59,47,0.12), transparent 60%),
      radial-gradient(54% 60% at 88% 104%, rgba(255,59,47,0.10), transparent 62%),
      radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.65) 120%);
  }
  /* 분위기 ─ 미세한 먹 입자(그레인) */
  .grain {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 200px;
  }

  /* ═════════ 상단 진행 실선(빛의 실) ═════════ */
  .progress {
    position: fixed; top: 0; left: 0;
    height: 2px; width: 0%;
    background: linear-gradient(90deg, var(--scarlet-deep), var(--scarlet), var(--scarlet-2));
    box-shadow: var(--glow);
    z-index: var(--z-top);
    transition: width 0.12s linear;
  }

  /* ═════════ 가로 두루마리 ═════════ */
  .scroll {
    position: relative;
    width: 100vw; height: 100vh;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    display: flex;
    z-index: var(--z-content);
    -webkit-overflow-scrolling: touch;
  }
  .scroll::-webkit-scrollbar { display: none; }
  .scroll { scrollbar-width: none; }

  .panel {
    flex: 0 0 100vw;
    height: 100vh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 4rem 8rem;
  }

  /* ═════════ 표제(表題) ─ 인트로 ═════════ */
  .intro { flex-direction: column; gap: 1.4rem; text-align: center; }

  .intro-mark {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: 2.3rem;
    color: var(--ash);
    background: var(--scarlet);
    width: 4.4rem; height: 4.4rem;
    display: grid; place-items: center;
    transform: rotate(-4deg);
    margin-bottom: 0.4rem;
    box-shadow: var(--glow), inset 0 0 0 1px rgba(0,0,0,0.25);
    border-radius: 3px;
  }
  .intro-title {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: clamp(2.4rem, 6vw, 5rem);
    letter-spacing: 0.16em;
    line-height: 1.5;
    text-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  .intro-title .accent {
    color: var(--scarlet);
    text-shadow: var(--glow-soft);
  }
  .intro-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--ash-mute);
    letter-spacing: 0.34em;
    text-transform: uppercase;
  }
  .intro-divider {
    width: 5.5rem; height: 1px;
    background: linear-gradient(90deg, transparent, var(--scarlet), transparent);
    box-shadow: var(--glow-soft);
    margin: 1.2rem 0;
  }
  .intro-desc {
    max-width: 34rem;
    line-height: 2.25;
    color: var(--ash-soft);
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.03em;
  }
  .intro-meta {
    margin-top: 1.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ash-mute);
    letter-spacing: 0.18em;
    font-size: 0.88rem;
  }

  /* ═════════ 작품 패널 ═════════ */
  .work { gap: 5rem; }

  .card-wrap {
    flex: 0 0 auto;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* 카드 뒤 주홍 후광(스포트라이트) */
  .card-wrap::after {
    content: '';
    position: absolute; inset: -12% -10%;
    background: radial-gradient(ellipse at center, rgba(255,59,47,0.16), transparent 68%);
    opacity: 0;
    transition: opacity 0.9s var(--ease);
    pointer-events: none;
    z-index: -1;
  }
  .panel.active .card-wrap::after { opacity: 1; }
  /* 바닥 그림자 */
  .card-wrap::before {
    content: '';
    position: absolute;
    left: 50%; bottom: -2.4rem;
    transform: translateX(-50%);
    width: 64%; height: 1.8rem;
    background: radial-gradient(ellipse, rgba(0,0,0,0.6), transparent 70%);
    filter: blur(9px);
    pointer-events: none;
  }

  .card {
    height: min(70vh, 38rem);
    width: -moz-fit-content;
    width: fit-content;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    border-radius: 3px;
    transform: rotate(-1deg);
    transition: transform 0.9s var(--ease), box-shadow 0.6s var(--ease);
    box-shadow:
      0 34px 70px -22px rgba(0,0,0,0.85),
      0 12px 30px -12px rgba(0,0,0,0.7),
      0 0 0 1px var(--line),
      inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .card:hover, .card:focus-visible {
    transform: rotate(0deg) translateY(-6px);
    outline: none;
    box-shadow:
      0 44px 90px -22px rgba(0,0,0,0.9),
      0 0 0 1px var(--scarlet),
      0 0 36px rgba(255,59,47,0.45);
  }
  .card img {
    height: 100%; width: auto;
    display: block;
  }
  /* 낙관(落款) ─ 주홍 도장 */
  .card .seal {
    position: absolute;
    bottom: 0.9rem; right: 0.9rem;
    width: 2.5rem; height: 2.5rem;
    background: var(--scarlet);
    color: var(--ash);
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    display: grid; place-items: center;
    font-size: 1.1rem;
    border-radius: 3px;
    transform: rotate(3deg);
    box-shadow: 0 3px 12px rgba(0,0,0,0.5), var(--glow-soft);
    border: 1px solid rgba(0,0,0,0.2);
  }

  /* 안내판(placard) */
  .placard {
    max-width: 23rem;
    position: relative;
    padding-left: 2.8rem;
  }
  .placard::before {
    content: '';
    position: absolute;
    left: 0; top: 0.4rem; bottom: 0.4rem;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--scarlet) 18%, var(--scarlet) 82%, transparent);
    box-shadow: var(--glow-soft);
    opacity: 0.7;
  }
  .placard-no {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--scarlet);
    letter-spacing: 0.4em;
    margin-bottom: 1rem;
    text-shadow: var(--glow-soft);
  }
  .placard-title {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: 2.1rem;
    letter-spacing: 0.06em;
    line-height: 1.35;
    margin-bottom: 0.4rem;
    color: var(--ash);
  }
  .placard-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ash-mute);
    letter-spacing: 0.14em;
    margin-bottom: 1.8rem;
  }
  .placard-rule {
    width: 2.5rem; height: 1px;
    background: var(--scarlet);
    box-shadow: var(--glow-soft);
    margin-bottom: 1.5rem;
  }
  .placard-desc {
    font-size: 0.98rem;
    line-height: 2.15;
    color: var(--ash-soft);
    font-weight: 300;
    white-space: pre-line;
    letter-spacing: 0.02em;
  }

  /* ═════════ 종결(終結) ─ 아웃트로 ═════════ */
  .outro { flex-direction: column; gap: 1.8rem; text-align: center; }
  .outro-end {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: 6.5rem;
    color: var(--ash);
    line-height: 1;
    border: 2px solid var(--scarlet);
    padding: 1.4rem 2rem 1.1rem;
    border-radius: 4px;
    box-shadow: var(--glow), inset 0 0 30px rgba(255,59,47,0.12);
    text-shadow: 0 0 30px rgba(255,59,47,0.4);
  }
  .outro-text {
    margin-top: 1rem;
    color: var(--ash-soft);
    line-height: 2.25;
    max-width: 28rem;
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .outro-signature {
    margin-top: 0.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ash-mute);
    letter-spacing: 0.3em;
    font-size: 0.9rem;
  }

  /* ═════════ 음악 토글 ═════════ */
  .music-btn {
    position: fixed;
    top: 1.8rem; right: 1.8rem;
    width: 3.2rem; height: 3.2rem;
    border: 1px solid var(--line-strong);
    background: rgba(18,18,18,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--ash);
    border-radius: 50%;
    cursor: pointer;
    z-index: var(--z-top);
    display: grid; place-items: center;
    transition: background 0.35s var(--ease), color 0.35s var(--ease),
                border-color 0.35s var(--ease), transform 0.35s var(--ease);
  }
  .music-btn:hover { transform: rotate(8deg); border-color: var(--scarlet); }
  .music-btn:focus-visible { outline: 2px solid var(--scarlet); outline-offset: 3px; }
  .music-btn.playing {
    background: var(--scarlet);
    color: var(--void);
    border-color: var(--scarlet);
    box-shadow: var(--glow);
  }
  .music-btn.playing::after {
    content: '';
    position: absolute; inset: -6px;
    border: 1px solid var(--scarlet);
    border-radius: 50%;
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(0.95); opacity: 0.9; }
    100% { transform: scale(1.6);  opacity: 0; }
  }
  .music-btn svg { width: 1.1rem; height: 1.1rem; fill: currentColor; }
  .music-btn .icon-pause { display: none; }
  .music-btn.playing .icon-play  { display: none; }
  .music-btn.playing .icon-pause { display: block; }

  /* ═════════ 좌우 네비 ═════════ */
  .nav {
    position: fixed; top: 50%;
    transform: translateY(-50%);
    z-index: var(--z-top);
    width: 3rem; height: 3rem;
    cursor: pointer;
    color: var(--ash);
    background: none; border: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    opacity: 0.5;
    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease), text-shadow 0.3s var(--ease);
  }
  .nav:hover { opacity: 1; transform: translateY(-50%) scale(1.18); color: var(--scarlet); text-shadow: var(--glow-soft); }
  .nav:focus-visible { opacity: 1; outline: 2px solid var(--scarlet); outline-offset: 4px; border-radius: 4px; }
  .nav.prev { left: 1.5rem; }
  .nav.next { right: 1.5rem; }

  /* ═════════ 페이지 표시 ═════════ */
  .indicator {
    position: fixed; bottom: 1.8rem; left: 50%;
    transform: translateX(-50%);
    z-index: var(--z-top);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 0.35em;
    color: var(--ash-mute);
    font-size: 0.95rem;
    display: flex; align-items: baseline; gap: 0.5rem;
  }
  .indicator .cur {
    color: var(--scarlet);
    font-size: 1.25rem;
    font-weight: 500;
    min-width: 1.4rem; text-align: right;
    text-shadow: var(--glow-soft);
  }

  /* ═════════ 스크롤 힌트 ═════════ */
  .hint {
    position: absolute; bottom: 4.2rem; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    letter-spacing: 0.36em;
    color: var(--ash-mute);
    text-transform: uppercase;
    animation: hint 2.4s ease-in-out infinite;
  }
  @keyframes hint {
    0%, 100% { transform: translateX(-50%) translateY(0);    opacity: 0.45; }
    50%      { transform: translateX(-50%) translateY(-4px); opacity: 1; }
  }

  /* ═════════ 등장 애니메이션 ═════════ */
  .panel > *:not(.hint) {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
  }
  .panel.active > *:not(.hint) { opacity: 1; transform: translateY(0); }
  .panel.active > *:nth-child(1) { transition-delay: 0.05s; }
  .panel.active > *:nth-child(2) { transition-delay: 0.16s; }
  .panel.active > *:nth-child(3) { transition-delay: 0.27s; }
  .panel.active > *:nth-child(4) { transition-delay: 0.38s; }
  .panel.active > *:nth-child(5) { transition-delay: 0.49s; }
  .panel.active > *:nth-child(6) { transition-delay: 0.60s; }

  /* ═════════ 모바일 ═════════ */
  @media (max-width: 820px) {
    .panel { padding: 3rem 1.5rem; flex-direction: column; gap: 2rem; justify-content: center; }
    .work  { padding-top: 4.5rem; justify-content: center; gap: 1.8rem; }
    .card  { height: min(52vh, 26rem); }
    .card-wrap::before { bottom: -1.6rem; }
    .placard { max-width: 90vw; padding-left: 0; padding-top: 1.4rem; text-align: center; }
    .placard::before {
      left: 50%; top: 0; bottom: auto;
      width: 2.5rem; height: 1px;
      transform: translateX(-50%);
      background: var(--scarlet);
    }
    .placard-rule { margin-left: auto; margin-right: auto; }
    .placard-title { font-size: 1.5rem; }
    .placard-desc { font-size: 0.92rem; line-height: 1.95; }
    .intro-title { font-size: clamp(1.9rem, 8vw, 2.4rem); letter-spacing: 0.1em; }
    .outro-end { font-size: 4.2rem; }
    .nav { display: none; }
    .music-btn { top: 1rem; right: 1rem; width: 2.7rem; height: 2.7rem; }
    .indicator { font-size: 0.82rem; bottom: 1.1rem; }
    .hint { bottom: 3.2rem; }
  }

  /* ═════════ 모션 최소화 선호 ═════════ */
  @media (prefers-reduced-motion: reduce) {
    * { scroll-behavior: auto !important; }
    .scroll { scroll-behavior: auto !important; }
    .panel > *:not(.hint) { opacity: 1 !important; transform: none !important; transition: none !important; }
    .hint, .music-btn.playing::after { animation: none !important; }
    .card, .card:hover { transition: box-shadow 0.3s ease; }
  }
</style>
</head>
<body>

<div class="ambient" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>
<div class="progress" id="progress" aria-hidden="true"></div>

<main class="scroll" id="scroll">

  <!-- ───────── 표제(表題) ───────── -->
  <section class="panel intro" data-panel="0" aria-label="표제">
    <div class="intro-mark">展</div>
    <h1 class="intro-title">
      동양화로 그린<br>
      <span class="accent">현화고등학교</span>
    </h1>
    <p class="intro-sub">Friends in Eastern Strokes</p>
    <div class="intro-divider"></div>
    <p class="intro-desc">
      동양화로 다시그린 카드들에<br>
      친구들의 모습을 담았다
    </p>
    <p class="intro-meta">© 2026 현화고등학교 · All rights reserved</p>
    <div class="hint">→ 옆으로 넘겨주세요</div>
  </section>

  <!-- 작품 패널은 JS로 삽입됩니다 -->

  <!-- ───────── 종결(終結) ───────── -->
  <section class="panel outro" data-panel="last" aria-label="맺음">
    <div class="outro-end">終</div>
    <p class="outro-text">
      그림은 여기서 끝이지만<br>
      그려지지 못한 모습이 많다.<br>
      그리고 언젠가 다시, 이 자리에서.
    </p>
    <p class="outro-signature">— 墨 香 —</p>
  </section>

</main>

<!-- 배경음악 -->
<audio id="bgm" loop preload="auto">
  <source src="assets/music/abc.mp3" type="audio/mpeg">
</audio>

<!-- 음악 토글 -->
<button class="music-btn" id="musicBtn" title="음악 켜기 / 끄기" aria-label="배경음악 켜기 또는 끄기" aria-pressed="false">
  <svg class="icon-play"  viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
</button>

<!-- 좌우 화살표 -->
<button class="nav prev" id="prevBtn" aria-label="이전 작품">←</button>
<button class="nav next" id="nextBtn" aria-label="다음 작품">→</button>

<!-- 페이지 인디케이터 -->
<div class="indicator" aria-hidden="true">
  <span class="cur" id="curPage">01</span>
  <span>/</span>
  <span class="tot" id="totPage">00</span>
</div>

<script>
/* ════════════════════════════════════════════════════
   ▼▼▼ 작품 데이터 — 여기를 수정하세요 ▼▼▼

   - img:      assets/img 폴더의 파일명 (확장자 제외)
   - title:    작품 제목 (친구 별호 / 패의 이름)
   - subtitle: 영문 부제
   - seal:     낙관에 들어갈 한 글자 (생략 가능 → 한자 숫자 자동)
   - desc:     작품 설명 (\n 으로 줄바꿈)

   ※ 작품을 늘리거나 줄이려면 아래 배열에 항목만 추가/삭제하세요.
     예) 9번째 친구가 준비되면 assets/img/a09.png 를 넣고
         아래에 { img:'a09', title:'벗 其九', ... } 한 줄을 추가.
   ════════════════════════════════════════════════════ */
const IMG_DIR = 'assets/img/';
const IMG_EXT = 'png';   // png, webp 등으로 변경 가능

const ARTWORKS = [
  {
    img: '트럼프1',
    title: '벗 其一',
    subtitle: 'The First Companion',

/* ════════════════════════════════════════════════════
   ▲▲▲ 여기까지만 수정하면 됩니다 ▲▲▲
   ════════════════════════════════════════════════════ */

// 낙관용 한자 숫자 (seal 미지정 시 자동 부여)
const HANJA = ['一','二','三','四','五','六','七','八','九','十',
               '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];

// ─── 패널 생성 ───
const scroll = document.getElementById('scroll');
const outro  = scroll.querySelector('.outro');

ARTWORKS.forEach((w, i) => {
  const panel = document.createElement('section');
  panel.className = 'panel work';
  panel.dataset.panel = String(i + 1);
  panel.setAttribute('aria-label', `작품 ${i + 1}: ${w.title}`);
  const num  = String(i + 1).padStart(2, '0');
  const seal = w.seal || HANJA[i] || (i + 1);
  panel.innerHTML = `
    <div class="card-wrap">
      <div class="card" tabindex="0">
        <img src="${IMG_DIR}${w.img}.${IMG_EXT}" alt="${w.title} — ${w.subtitle}" loading="lazy"
             onerror="this.style.minWidth='22rem';this.style.background='linear-gradient(135deg,#1a1a1b,#0a0a0b)';">
        <div class="seal" aria-hidden="true">${seal}</div>
      </div>
    </div>
    <div class="placard">
      <div class="placard-no">No. ${num}</div>
      <h2 class="placard-title">${w.title}</h2>
      <p class="placard-sub">${w.subtitle}</p>
      <div class="placard-rule"></div>
      <p class="placard-desc">${w.desc}</p>
    </div>
  `;
  scroll.insertBefore(panel, outro);
});

// 총 페이지 표시
const allPanels = scroll.querySelectorAll('.panel');
document.getElementById('totPage').textContent = String(allPanels.length).padStart(2, '0');

// ─── 현재 페이지 추적 + 등장 애니메이션 ───
const curPageEl = document.getElementById('curPage');
let currentIndex = 0;

const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting && e.intersectionRatio > 0.55) {
      e.target.classList.add('active');
      const idx = Array.from(allPanels).indexOf(e.target);
      if (idx >= 0) {
        currentIndex = idx;
        curPageEl.textContent = String(idx + 1).padStart(2, '0');
      }
    }
  });
}, { root: scroll, threshold: [0, 0.55, 1] });

allPanels.forEach(p => io.observe(p));
requestAnimationFrame(() => allPanels[0].classList.add('active'));

// ─── 상단 진행 실선 ───
const progress = document.getElementById('progress');
function updateProgress() {
  const max = scroll.scrollWidth - scroll.clientWidth;
  const pct = max > 0 ? (scroll.scrollLeft / max) * 100 : 0;
  progress.style.width = pct + '%';
}
scroll.addEventListener('scroll', updateProgress, { passive: true });
window.addEventListener('resize', updateProgress);
updateProgress();

// ─── 좌우 네비 ───
function go(delta) {
  const next = Math.max(0, Math.min(allPanels.length - 1, currentIndex + delta));
  allPanels[next].scrollIntoView({ behavior: 'smooth', inline: 'start' });
}
document.getElementById('prevBtn').addEventListener('click', () => go(-1));
document.getElementById('nextBtn').addEventListener('click', () => go(1));

// 키보드: 화살표 / 스페이스
window.addEventListener('keydown', (e) => {
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); go(-1); }
});

// 마우스 휠 → 가로 스크롤
scroll.addEventListener('wheel', (e) => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    scroll.scrollLeft += e.deltaY;
  }
}, { passive: false });

// ─── 음악 토글 ───
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
let musicOn = false;

function setMusic(on) {
  musicOn = on;
  musicBtn.classList.toggle('playing', on);
  musicBtn.setAttribute('aria-pressed', String(on));
  musicBtn.title = on ? '음악 끄기' : '음악 켜기';
}

musicBtn.addEventListener('click', () => {
  if (musicOn) {
    bgm.pause();
    setMusic(false);
  } else {
    bgm.play().then(() => setMusic(true)).catch(err => console.log('재생 실패:', err));
  }
});

// 음악이 자연 종료되면(loop 해제 시) 토글도 OFF
bgm.addEventListener('ended', () => setMusic(false));
</script>
