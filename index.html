<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동양화로 그린 우리들 — 친구 소개展</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  /* ───────── 색·기본 ───────── */
  :root {
    --paper:        #ebe1c9;
    --paper-light:  #f3eada;
    --paper-deep:   #d9cbac;
    --ink:          #1a1611;
    --ink-soft:     #4a3f2e;
    --ink-mute:     #7a6a52;
    --vermilion:    #b53224;
    --vermilion-d:  #8a2418;
    --gold:         #a07e3b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    -webkit-font-smoothing: antialiased;
  }

  /* 종이 질감 (라이트 + 노이즈) */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,250,235,0.5), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(160,126,59,0.12), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.15), transparent 70%);
    pointer-events: none;
    z-index: 1;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='5'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.09  0 0 0 0 0.06  0 0 0 0.07 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size: 240px;
    opacity: 0.6;
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 2;
  }

  /* ───────── 가로 두루마리 ───────── */
  .scroll {
    position: relative;
    width: 100vw; height: 100vh;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    display: flex;
    z-index: 3;
    -webkit-overflow-scrolling: touch;
  }
  .scroll::-webkit-scrollbar { display: none; }
  .scroll { scrollbar-width: none; }

  .panel {
    flex: 0 0 100vw;
    height: 100vh;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 4rem 8rem;
  }

  /* ───────── 표제 (인트로) ───────── */
  .intro {
    flex-direction: column;
    gap: 1.5rem;
    text-align: center;
  }
  .intro-mark {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: 2.4rem;
    color: var(--paper-light);
    background: var(--vermilion);
    width: 4.2rem; height: 4.2rem;
    display: grid; place-items: center;
    box-shadow: 0 4px 18px rgba(181,50,36,0.35);
    transform: rotate(-4deg);
    margin-bottom: 0.5rem;
    letter-spacing: 0;
  }
  .intro-title {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: clamp(2.4rem, 6vw, 5.2rem);
    letter-spacing: 0.18em;
    line-height: 1.45;
  }
  .intro-title .accent { color: var(--vermilion); }
  .intro-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--ink-mute);
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }
  .intro-divider {
    width: 6rem; height: 1px;
    background: var(--ink);
    opacity: 0.35;
    margin: 1.5rem 0;
  }
  .intro-desc {
    max-width: 34rem;
    line-height: 2.2;
    color: var(--ink-soft);
    font-size: 0.98rem;
    letter-spacing: 0.04em;
  }
  .intro-meta {
    margin-top: 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-mute);
    letter-spacing: 0.2em;
    font-size: 0.9rem;
  }

  /* ───────── 작품 패널 ───────── */
  .work { gap: 5rem; }

  .card-wrap {
    flex: 0 0 auto;
    position: relative;
    perspective: 1200px;
  }
  .card-wrap::before {
    content: '';
    position: absolute;
    left: 50%; bottom: -3rem;
    transform: translateX(-50%);
    width: 70%; height: 2rem;
    background: radial-gradient(ellipse, rgba(26,22,17,0.25), transparent 70%);
    filter: blur(8px);
    pointer-events: none;
  }
  .card {
    width: min(38vh, 22rem);
    aspect-ratio: 5 / 7;
    background: var(--paper-light);
    box-shadow:
      0 30px 60px -20px rgba(26,22,17,0.45),
      0 12px 30px -10px rgba(26,22,17,0.25),
      0 0 0 1px rgba(26,22,17,0.15),
      inset 0 0 0 8px var(--paper-light),
      inset 0 0 0 9px rgba(26,22,17,0.12);
    position: relative;
    overflow: hidden;
    transform: rotate(-1.2deg);
    transition: transform 0.9s cubic-bezier(0.16,1,0.3,1);
  }
  .card:hover {
    transform: rotate(0deg) translateY(-4px);
  }
  .card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .card .seal {
    position: absolute;
    bottom: 1.2rem; right: 1.2rem;
    width: 2.6rem; height: 2.6rem;
    background: var(--vermilion);
    color: var(--paper-light);
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    display: grid; place-items: center;
    font-size: 1.15rem;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    transform: rotate(2deg);
  }

  .placard {
    max-width: 24rem;
    position: relative;
    padding-left: 2.8rem;
  }
  .placard::before {
    content: '';
    position: absolute;
    left: 0; top: 0.4rem; bottom: 0.4rem;
    width: 1px;
    background: linear-gradient(to bottom,
      transparent, var(--ink) 15%, var(--ink) 85%, transparent);
    opacity: 0.6;
  }
  .placard-no {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--vermilion);
    letter-spacing: 0.4em;
    margin-bottom: 1rem;
  }
  .placard-title {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: 2.1rem;
    letter-spacing: 0.06em;
    line-height: 1.35;
    margin-bottom: 0.4rem;
  }
  .placard-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink-mute);
    letter-spacing: 0.14em;
    margin-bottom: 2rem;
  }
  .placard-rule {
    width: 2.5rem; height: 1px;
    background: var(--vermilion);
    margin-bottom: 1.5rem;
  }
  .placard-desc {
    font-size: 0.98rem;
    line-height: 2.1;
    color: var(--ink-soft);
    white-space: pre-line;
    letter-spacing: 0.02em;
  }

  /* ───────── 종결 (아웃트로) ───────── */
  .outro {
    flex-direction: column;
    gap: 2rem;
    text-align: center;
  }
  .outro-end {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: 7rem;
    letter-spacing: 0;
    color: var(--ink);
    line-height: 1;
    border: 2px solid var(--ink);
    padding: 1.5rem 2.2rem 1.2rem 2.5rem;
  }
  .outro-text {
    margin-top: 1.5rem;
    color: var(--ink-soft);
    line-height: 2.2;
    max-width: 28rem;
    letter-spacing: 0.05em;
  }
  .outro-signature {
    margin-top: 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-mute);
    letter-spacing: 0.3em;
    font-size: 0.9rem;
  }

  /* ───────── 음악 토글 ───────── */
  .music-btn {
    position: fixed;
    top: 1.8rem; right: 1.8rem;
    width: 3.2rem; height: 3.2rem;
    border: 1px solid var(--ink);
    background: var(--paper-light);
    color: var(--ink);
    border-radius: 50%;
    cursor: pointer;
    z-index: 100;
    display: grid; place-items: center;
    transition: all 0.35s ease;
  }
  .music-btn:hover {
    background: var(--ink);
    color: var(--paper-light);
    transform: rotate(8deg);
  }
  .music-btn.playing {
    background: var(--vermilion);
    color: var(--paper-light);
    border-color: var(--vermilion);
  }
  .music-btn.playing::after {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px solid var(--vermilion);
    border-radius: 50%;
    animation: pulse 2.2s ease-out infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(0.95); opacity: 0.9; }
    100% { transform: scale(1.55); opacity: 0; }
  }
  .music-btn svg {
    width: 1.1rem; height: 1.1rem;
    fill: currentColor;
  }
  .music-btn .icon-pause { display: none; }
  .music-btn.playing .icon-play { display: none; }
  .music-btn.playing .icon-pause { display: block; }

  /* ───────── 좌우 네비 ───────── */
  .nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    width: 3rem; height: 3rem;
    cursor: pointer;
    color: var(--ink);
    background: none;
    border: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    opacity: 0.55;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .nav:hover { opacity: 1; transform: translateY(-50%) scale(1.15); }
  .nav.prev { left: 1.5rem; }
  .nav.next { right: 1.5rem; }

  /* ───────── 페이지 표시 ───────── */
  .indicator {
    position: fixed;
    bottom: 1.8rem; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    letter-spacing: 0.35em;
    color: var(--ink-mute);
    font-size: 0.95rem;
    display: flex; align-items: baseline; gap: 0.5rem;
  }
  .indicator .cur {
    color: var(--vermilion);
    font-size: 1.25rem;
    font-weight: 500;
    min-width: 1.4rem; text-align: right;
  }

  /* ───────── 스크롤 힌트 ───────── */
  .hint {
    position: absolute;
    bottom: 4.5rem; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    color: var(--ink-mute);
    text-transform: uppercase;
    animation: hint 2.4s ease-in-out infinite;
  }
  @keyframes hint {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
    50%      { transform: translateX(-50%) translateY(-4px); opacity: 1; }
  }

  /* ───────── 등장 애니메이션 ───────── */
  .panel > * {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
                transform 0.9s cubic-bezier(0.16,1,0.3,1);
  }
  .panel.active > * {
    opacity: 1;
    transform: translateY(0);
  }
  .panel.active > *:nth-child(1) { transition-delay: 0.05s; }
  .panel.active > *:nth-child(2) { transition-delay: 0.18s; }
  .panel.active > *:nth-child(3) { transition-delay: 0.30s; }
  .panel.active > *:nth-child(4) { transition-delay: 0.42s; }
  .panel.active > *:nth-child(5) { transition-delay: 0.54s; }
  .panel.active > *:nth-child(6) { transition-delay: 0.66s; }

  /* ───────── 모바일 ───────── */
  @media (max-width: 820px) {
    .panel {
      padding: 3rem 1.5rem;
      flex-direction: column;
      gap: 2rem;
      justify-content: center;
    }
    .work { padding-top: 4.5rem; justify-content: flex-start; gap: 2rem; }
    .card { width: min(62vw, 17rem); }
    .card-wrap::before { bottom: -2rem; }
    .placard {
      max-width: 90vw;
      padding-left: 0;
      padding-top: 1.5rem;
      text-align: center;
    }
    .placard::before {
      left: 50%; top: 0; bottom: auto;
      width: 2.5rem; height: 1px;
      transform: translateX(-50%);
      background: var(--ink);
      opacity: 0.5;
    }
    .placard-rule { margin-left: auto; margin-right: auto; }
    .placard-title { font-size: 1.55rem; }
    .placard-desc { font-size: 0.92rem; line-height: 1.95; }
    .intro-title { font-size: clamp(1.8rem, 8vw, 2.4rem); letter-spacing: 0.12em; }
    .outro-end { font-size: 4.5rem; }
    .nav { display: none; }
    .music-btn { top: 1rem; right: 1rem; width: 2.7rem; height: 2.7rem; }
    .indicator { font-size: 0.82rem; bottom: 1.2rem; }
  }
</style>
</head>
<body>

<div class="scroll" id="scroll">

  <!-- ───────── 표제(表題) ───────── -->
  <section class="panel intro" data-panel="0">
    <div class="intro-mark">展</div>
    <h1 class="intro-title">
      동양화로 그린<br>
      <span class="accent">우리들</span>
    </h1>
    <p class="intro-sub">Friends in Eastern Strokes</p>
    <div class="intro-divider"></div>
    <p class="intro-desc">
      벗의 얼굴을 한 장의 패(牌)에 담았다.<br>
      먹과 종이 위에 머문 우리들의 모습.<br>
      한 사람 한 사람의 이야기를 천천히 펼쳐 보인다.
    </p>
    <p class="intro-meta">A.D. 2026 · 美術科 課題展</p>
    <div class="hint">→ 옆으로 넘겨주세요</div>
  </section>

  <!-- 작품 패널은 JS로 삽입됩니다 -->

  <!-- ───────── 종결(終結) ───────── -->
  <section class="panel outro" data-panel="last">
    <div class="outro-end">終</div>
    <p class="outro-text">
      벗을 그리는 일은<br>
      나를 비춰보는 일이기도 했다.<br>
      관람해 주셔서 감사합니다.
    </p>
    <p class="outro-signature">— 墨 香 —</p>
  </section>

</div>

<!-- 배경음악 -->
<audio id="bgm" loop preload="auto">
  <source src="assets/music/abc.mp3" type="audio/mpeg">
</audio>

<!-- 음악 토글 -->
<button class="music-btn" id="musicBtn" title="음악 켜기 / 끄기" aria-label="음악 토글">
  <svg class="icon-play" viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
</button>

<!-- 좌우 화살표 -->
<button class="nav prev" id="prevBtn" aria-label="이전">←</button>
<button class="nav next" id="nextBtn" aria-label="다음">→</button>

<!-- 페이지 인디케이터 -->
<div class="indicator">
  <span class="cur" id="curPage">01</span>
  <span>/</span>
  <span class="tot" id="totPage">00</span>
</div>

<script>
/* ════════════════════════════════════════════════════
   ▼▼▼ 작품 데이터 — 여기를 수정하세요 ▼▼▼

   - img:      assets/img 폴더의 파일명 (확장자 제외)
   - title:    작품 제목 (친구 별호 / 패의 이름)
   - subtitle: 영문 부제
   - seal:     낙관에 들어갈 한 글자 (생략 가능)
   - desc:     작품 설명 (\n 으로 줄바꿈)

   ※ 작품을 늘리거나 줄이려면 아래 배열에 항목만 추가/삭제하면 됩니다.
   ════════════════════════════════════════════════════ */
const IMG_DIR = 'assets/img/';
const IMG_EXT = 'png';   // png, webp 등으로 바꿀 수 있음

const ARTWORKS = [
  {
    img: 'a01',
    title: '벗 其一',
    subtitle: 'The First Companion',
    desc: '맑은 아침에 어울리는 벗.\n조용한 가운데에도 빛이 있어\n이 패에 그 모습을 담았다.'
  },
  {
    img: 'a02',
    title: '벗 其二',
    subtitle: 'The Second Companion',
    desc: '웃음이 먼저 닿는 사람.\n바람결에 흔들리는 꽃처럼\n어느 자리에서나 환하다.'
  },
  {
    img: 'a03',
    title: '벗 其三',
    subtitle: 'The Third Companion',
    desc: '말수는 적어도 마음이 깊다.\n오래된 먹 향처럼\n곁에 있을수록 진해지는 사람.'
  },
  {
    img: 'a04',
    title: '벗 其四',
    subtitle: 'The Fourth Companion',
    desc: '재기(才氣)가 번뜩이는 친구.\n붓끝이 닿는 자리마다\n뜻밖의 풍경이 펼쳐진다.'
  },
  {
    img: 'a05',
    title: '벗 其五',
    subtitle: 'The Fifth Companion',
    desc: '단단한 신의(信義)를 가진 벗.\n쉽게 흔들리지 않는 산처럼\n묵직하게 자리를 지킨다.'
  },
  {
    img: 'a06',
    title: '벗 其六',
    subtitle: 'The Sixth Companion',
    desc: '늘 새로움을 좇는 사람.\n물처럼 흐르며\n낯선 곳에서도 길을 낸다.'
  },
  {
    img: 'a07',
    title: '벗 其七',
    subtitle: 'The Seventh Companion',
    desc: '다정함이 몸에 밴 벗.\n작은 일도 그냥 지나치지 않아\n곁의 사람을 따뜻하게 한다.'
  },
  {
    img: 'a08',
    title: '벗 其八',
    subtitle: 'The Eighth Companion',
    desc: '꿈을 품고 사는 사람.\n달을 가리키는 손가락처럼\n늘 먼 곳을 바라본다.'
  },
  {
    img: 'a09',
    title: '벗 其九',
    subtitle: 'The Ninth Companion',
    desc: '함께 있으면 편안한 벗.\n오래 묵힌 차(茶) 한 잔처럼\n익숙하고 따뜻한 사람.'
  }
];
/* ════════════════════════════════════════════════════
   ▲▲▲ 여기까지만 수정하면 됩니다 ▲▲▲
   ════════════════════════════════════════════════════ */

// 낙관용 한자 숫자 (seal 미지정 시 자동 부여)
const HANJA = ['一','二','三','四','五','六','七','八','九','十',
               '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];

// ─── 패널 생성 ───
const scroll = document.getElementById('scroll');
const outro = scroll.querySelector('.outro');

ARTWORKS.forEach((w, i) => {
  const panel = document.createElement('section');
  panel.className = 'panel work';
  panel.dataset.panel = String(i + 1);
  const num = String(i + 1).padStart(2, '0');
  const seal = w.seal || HANJA[i] || (i + 1);
  panel.innerHTML = `
    <div class="card-wrap">
      <div class="card">
        <img src="${IMG_DIR}${w.img}.${IMG_EXT}" alt="${w.title}" loading="lazy"
             onerror="this.style.background='linear-gradient(135deg,#d9cbac,#b8a982)';this.style.objectFit='contain';">
        <div class="seal">${seal}</div>
      </div>
    </div>
    <div class="placard">
      <div class="placard-no">No. ${num}</div>
      <h2 class="placard-title">${w.title}</h2>
      <p class="placard-sub">${w.subtitle}</p>
      <div class="placard-rule"></div>
      <p class="placard-desc">${w.desc}</p>
    </div>
  `;
  scroll.insertBefore(panel, outro);
});

// 총 페이지 표시
const allPanels = scroll.querySelectorAll('.panel');
document.getElementById('totPage').textContent = String(allPanels.length).padStart(2, '0');

// ─── 현재 페이지 추적 + 등장 애니메이션 ───
const curPageEl = document.getElementById('curPage');
let currentIndex = 0;

const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting && e.intersectionRatio > 0.55) {
      e.target.classList.add('active');
      const idx = Array.from(allPanels).indexOf(e.target);
      if (idx >= 0) {
        currentIndex = idx;
        curPageEl.textContent = String(idx + 1).padStart(2, '0');
      }
    }
  });
}, { root: scroll, threshold: [0, 0.55, 1] });

allPanels.forEach(p => io.observe(p));
requestAnimationFrame(() => allPanels[0].classList.add('active'));

// ─── 좌우 네비 ───
function go(delta) {
  const next = Math.max(0, Math.min(allPanels.length - 1, currentIndex + delta));
  allPanels[next].scrollIntoView({ behavior: 'smooth', inline: 'start' });
}
document.getElementById('prevBtn').addEventListener('click', () => go(-1));
document.getElementById('nextBtn').addEventListener('click', () => go(1));

// 키보드: 화살표 / 스페이스
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  { e.preventDefault(); go(-1); }
});

// 마우스 휠 → 가로 스크롤
scroll.addEventListener('wheel', (e) => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    scroll.scrollLeft += e.deltaY;
  }
}, { passive: false });

// ─── 음악 토글 ───
const bgm = document.getElementById('bgm');
const musicBtn = document.getElementById('musicBtn');
let musicOn = false;

musicBtn.addEventListener('click', () => {
  if (musicOn) {
    bgm.pause();
    musicBtn.classList.remove('playing');
    musicBtn.title = '음악 켜기';
  } else {
    bgm.play().catch(err => console.log('재생 실패:', err));
    musicBtn.classList.add('playing');
    musicBtn.title = '음악 끄기';
  }
  musicOn = !musicOn;
});

// (loop 끄고 사용할 때) 음악이 자연 종료되면 토글도 OFF
bgm.addEventListener('ended', () => {
  musicOn = false;
  musicBtn.classList.remove('playing');
  musicBtn.title = '음악 켜기';
});
</script>

</body>
</html>
